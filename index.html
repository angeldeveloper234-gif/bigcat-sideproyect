<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-05BP9YM1KM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-05BP9YM1KM');
  </script>
  <title>Big Cat - Control de Plagas | Fumigaciones en México</title>
  <meta name="description" content="Big Cat - Control de Plagas: Servicios profesionales de fumigación y control de plagas en México. Más de 29 años de experiencia protegiendo hogares y negocios con resultados garantizados." />
  <meta name="keywords" content="big cat, bigcat, control de plagas, fumigaciones mexico, exterminador, fumigacion residencial, fumigacion comercial" />
  <link rel="icon" type="image/png" href="/logo/BIG CAT - Control de plagas.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" as="style">
  <link rel="preload" href="/images/hero.png" as="image">
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'xs': '430px',
          },
          colors: {
            brand: {
              red: '#E53935',
              primary: '#E53935', // Alias for backward compatibility
              darkRed: '#B71C1C',
              dark: '#0A0A0A',
              slate: '#1A1A1A',
              gray: '#F3F4F6',
              white: '#FFFFFF',
            }
          },
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
            display: ['Outfit', 'Montserrat', 'sans-serif'],
          },
          animation: {
            'shimmer': 'shimmer 2s linear infinite',
          },
          keyframes: {
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar for a premium feel */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #E53935;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #B71C1C;
    }

    /* Small Mobile Optimizations (< 430px) */
    @media (max-width: 430px) {
      h1 {
        font-size: 2.75rem !important;
        line-height: 1.1 !important;
      }

      h2 {
        font-size: 2.25rem !important;
        line-height: 1.1 !important;
      }

      /* Scale down general buttons */
      a[class*="px-10"],
      button[class*="px-10"],
      a[class*="py-6"],
      button[class*="py-6"],
      a[class*="py-5"],
      button[class*="py-5"] {
        padding-left: 1.5rem !important;
        padding-right: 1.5rem !important;
        padding-top: 1rem !important;
        padding-bottom: 1rem !important;
        font-size: 0.9rem !important;
      }

      /* Adjust text size in buttons specifically as requested */
      .btn-mobile-small,
      a[class*="text-lg"],
      button[class*="text-lg"] {
        font-size: 0.875rem !important;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    /* Infinite Scroll Animation */
    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-scroll {
      animation: scroll 80s linear infinite;
    }

    .animate-scroll:hover {
      animation-play-state: paused;
    }
  </style>

</head>

<body class="bg-brand-gray text-brand-dark antialiased selection:bg-brand-red selection:text-white">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
